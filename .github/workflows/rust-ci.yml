name: Rust CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true          # Garante que o pipeline valide as queries SQL sem precisar do banco real ligado

jobs:
  code-quality-and-testing:
    name: Code Quality and Testing Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy  # Sintaxe corrigida (rustfmt em vez de fmt) para evitar o erro de depreciação

      - name: Rust Cache Dependencies
        uses: swatinem/rust-cache@v2

      - name: 1. Clean Code Check (cargo fmt)
        run: cargo fmt --all -- --check

      - name: 2. Linter Strict Analysis (cargo clippy)
        run: cargo clippy -- -D warnings

      - name: 3. Execute Automation Test Suite (cargo test)
        run: cargo test --workspace --verbose